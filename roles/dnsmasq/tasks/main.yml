---
- name: Cài đặt gói Dnsmasq
  ansible.builtin.dnf:
    name: dnsmasq
    state: present

- name: Cấu hình DNS records và SRV records cho OKD4 (Drop-in file)
  ansible.builtin.blockinfile:
    path: /etc/dnsmasq.d/okd4.conf
    create: true
    marker: "# {mark} OKD4 DNSMASQ CONFIG BY ANSIBLE"
    block: |
      domain={{ okd_domain }}
      local=/{{ okd_domain }}/
      expand-hosts
      listen-address=127.0.0.1,{{ okd_manager_ip }}
      bind-interfaces
      address=/apps.{{ okd_domain }}/{{ okd_apps_vip }}
      host-record=api.{{ okd_domain }},{{ okd_api_vip }}
      host-record=api-int.{{ okd_domain }},{{ okd_api_vip }}
      host-record=bootstrap.{{ okd_domain }},{{ okd_bootstrap_ip }}
      {% for node in okd_masters %}
      host-record={{ node.name }}.{{ okd_domain }},{{ node.ip }}
      host-record={{ node.etcd }}.{{ okd_domain }},{{ node.ip }}
      srv-host=_etcd-server-ssl._tcp.{{ okd_domain }},{{ node.etcd }}.{{ okd_domain }},2380,0,10
      {% endfor %}
      {% for dns in okd_fallback_dns %}
      server={{ dns }}
      {% endfor %}
  notify: Restart Dnsmasq

- name: Mở port DNS trên Firewalld
  ansible.posix.firewalld:
    service: dns
    state: enabled
    permanent: true
    immediate: true

- name: Khởi động và cho phép Dnsmasq chạy ngầm
  ansible.builtin.systemd:
    name: dnsmasq
    state: started
    enabled: true

- name: Get active NetworkManager connection
  ansible.builtin.command: nmcli -t -f NAME connection show --active
  register: nmcli_active
  changed_when: false

- name: Lấy tên Card mạng đang Active (Bỏ qua loopback/docker)
  ansible.builtin.shell: nmcli -t -f NAME,TYPE connection show --active | grep -v 'loopback\|bridge\|tun' | head -n 1 | cut -d':' -f1
  register: nmcli_active
  changed_when: false

- name: Cập nhật DNS cho NetworkManager (Idempotent Native Shell)
  ansible.builtin.shell: |
    CONN_NAME="{{ nmcli_active.stdout }}"
    DESIRED_DNS="{{ ([okd_manager_ip] + okd_fallback_dns) | join(' ') }}"
    DESIRED_SEARCH="{{ okd_domain }}"

    # Dùng nmcli và cut để bóc tách IP hiện tại cực kỳ an toàn
    CURRENT_DNS=$(nmcli -t -f ipv4.dns connection show "$CONN_NAME" | cut -d':' -f2 | tr ',' ' ')
    CURRENT_SEARCH=$(nmcli -t -f ipv4.dns-search connection show "$CONN_NAME" | cut -d':' -f2 | tr ',' ' ')

    # Hàm normalize để so sánh không phân biệt thứ tự IP
    normalize() { echo "$1" | xargs -n1 2>/dev/null | sort | xargs; }

    if [ "$(normalize "$CURRENT_DNS")" != "$(normalize "$DESIRED_DNS")" ] || [ "$(normalize "$CURRENT_SEARCH")" != "$(normalize "$DESIRED_SEARCH")" ]; then
        nmcli connection modify "$CONN_NAME" ipv4.dns "$DESIRED_DNS" ipv4.dns-search "$DESIRED_SEARCH"
        nmcli connection up "$CONN_NAME"
        echo "CHANGED"
    else
        echo "OK"
    fi
  register: nmcli_update
  changed_when: "'CHANGED' in nmcli_update.stdout"
  when: nmcli_active.stdout | length > 0
