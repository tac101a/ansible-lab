---
- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create GitLab data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ gitlab_install_dir }}/config"
    - "{{ gitlab_install_dir }}/data"
    - "{{ gitlab_install_dir }}/logs"

- name: Deploy docker-compose.yml from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ gitlab_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  register: compose_template

- name: Open ports for GitLab communication on Firewalld
  ansible.posix.firewalld:
    port: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - "{{ gitlab_http_port }}/tcp"
    - "{{ gitlab_https_port }}/tcp"
    - "{{ gitlab_ssh_port }}/tcp"

- name: Start GitLab via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ gitlab_install_dir }}"
  when: compose_template.changed
  changed_when: true

- name: Ensure GitLab containers are running (idempotent check)
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ gitlab_install_dir }}"
  when: not compose_template.changed
  changed_when: false
